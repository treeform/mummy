name: Github Actions
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: treeform/setup-nim-action@v6
      - run: nimby install -g
      - run: nimby install -g whisky
      - run: nimby install -g jsony
      - run: nim check src/mummy.nim
      - run: nim check tests/test.nim
      - run: nim check tests/test_http.nim
      - run: nim check tests/test_http2.nim
      - run: nim check tests/test_websockets.nim
      - run: nim check -d:mummyNoWorkers tests/fuzz_recv.nim
      - run: nim r tests/test.nim
      - run: nim r tests/test_http.nim
      - run: nim r tests/test_http2.nim
      - run: nim r tests/test_websockets.nim
      - run: nim r -d:mummyNoWorkers tests/fuzz_recv.nim
